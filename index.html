<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="瘋狂觸媒實驗室 - 行銷小凱的空汙防制黑科技基地">
    <title>瘋狂觸媒實驗室 | 行銷小凱的黑科技基地</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        .glitch { animation: glitch 0.5s infinite; }
        @keyframes glitch {
            0%,100% { transform: translate(0); }
            50% { transform: translate(-3px, 3px); }
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen">

    <!-- Loading -->
    <div id="loading" class="fixed inset-0 bg-black flex items-center justify-center z-50">
        <div class="text-center">
            <div class="text-6xl mb-8 font-bold tracking-widest glitch text-green-400">瘋狂初始化中...</div>
            <div class="text-green-400 text-2xl mb-8">WORLD -1</div>
            <div class="text-8xl mb-8">🧪</div>
            <div class="w-80 h-2 bg-gray-800 mx-auto rounded overflow-hidden">
                <div class="h-full bg-green-400 w-0 animate-[loading_1.8s_linear_forwards]"></div>
            </div>
        </div>
    </div>

    <header class="border-b border-green-500/40 bg-black/80 backdrop-blur sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <i class="fas fa-flask text-4xl text-green-500"></i>
                <div>
                    <h1 class="text-3xl font-bold">瘋狂觸媒實驗室</h1>
                    <p class="text-green-400 text-sm">行銷小凱的空汙防制黑科技基地</p>
                </div>
            </div>
            <a href="https://www.tw-catalyst.com" target="_blank" class="hover:text-green-400">← 返回官網</a>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-8 py-12">
        <h2 class="text-5xl font-bold text-center mb-3">瘋狂科學家在此！</h2>
        <p class="text-center text-green-400 mb-12 text-xl">點擊卡片，進入我瘋狂整理的專業知識</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="topics"></div>

        <div id="article" class="hidden mt-12 bg-slate-900/95 border border-green-500/40 rounded-3xl p-12 max-w-4xl mx-auto">
            <button onclick="backToHome()" class="mb-8 px-8 py-4 bg-green-600 hover:bg-green-500 rounded-2xl flex items-center gap-3 text-lg font-medium">
                <i class="fas fa-arrow-left"></i> 返回瘋狂主題列表
            </button>
            <div id="articleContent" class="prose prose-invert max-w-none text-lg leading-relaxed"></div>
            <div class="mt-12 flex gap-4 justify-center">
                <button onclick="backToHome()" class="px-8 py-4 bg-slate-800 hover:bg-green-600 rounded-2xl">← 回主題列表</button>
                <button onclick="switchRandomTopic()" class="px-8 py-4 bg-slate-800 hover:bg-green-600 rounded-2xl">換一篇</button>
            </div>
        </div>
    </div>

    <footer class="py-20 bg-black/70 border-t border-green-500/30 text-center">
        <p class="mb-6 text-green-400 text-xl">想直接問行銷小凱？</p>
        <a href="https://lin.ee/r0lfbqu" target="_blank" class="inline-flex flex-col items-center gap-5 hover:scale-110 transition">
            <div class="w-32 h-32 bg-green-500 rounded-3xl flex items-center justify-center shadow-xl">
                <i class="fab fa-line text-8xl text-black"></i>
            </div>
            <span class="text-2xl text-green-400">加入 LINE@ 行銷小凱</span>
        </a>
    </footer>

    <script>
        const articles = {
            voc: { title: "VOC 催化氧化技術全解析", content: "<p>詳細說明原理、設備選型、陶瓷載體規格等...</p>" },
            scr: { title: "SCR 脫硝系統操作指南", content: "<p>溫度控制、觸媒壽命、再生技巧...</p>" },
            dpf: { title: "DPF 柴油顆粒濾器維護", content: "<p>再生技術與實務經驗分享...</p>" },
            regs: { title: "2026 台灣空污法規重點", content: "<p>EPA 最新要求與合規指南...</p>" }
        };

        function renderTopics() {
            document.getElementById('topics').innerHTML = Object.keys(articles).map(key => `
                <div onclick="showArticle('${key}')" class="bg-slate-800 hover:bg-slate-700 border-2 border-green-500/50 hover:border-green-400 rounded-3xl p-12 cursor-pointer transition-all group">
                    <h3 class="text-3xl font-bold group-hover:text-green-400">${articles[key].title}</h3>
                </div>
            `).join('');
        }

        function showArticle(key) {
            const art = articles[key];
            document.getElementById('topics').classList.add('hidden');
            document.getElementById('articleContent').innerHTML = `<h2 class="text-4xl font-bold mb-8">${art.title}</h2>${art.content}`;
            document.getElementById('article').classList.remove('hidden');
        }

        function backToHome() {
            document.getElementById('article').classList.add('hidden');
            document.getElementById('topics').classList.remove('hidden');
        }

        function switchRandomTopic() {
            const keys = Object.keys(articles);
            showArticle(keys[Math.floor(Math.random() * keys.length)]);
        }

        // 強制顯示主畫面
        window.onload = () => {
            renderTopics();
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 1600);
        };
    </script>
</body>
</html>
